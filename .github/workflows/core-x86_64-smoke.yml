name: Core x86_64 Boot Smoke

on:
  push:
    branches:
      - main
      - codex/kernel-safety-fixes
    paths:
      - .github/workflows/core-x86_64-smoke.yml
      - CHANGELOG.md
      - README.md
      - core/**
      - docs/core/**
  pull_request:
    paths:
      - .github/workflows/core-x86_64-smoke.yml
      - CHANGELOG.md
      - README.md
      - core/**
      - docs/core/**

jobs:
  x86_64-smoke:
    name: x86_64 headless boot smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build and boot tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            grub-common \
            grub-pc-bin \
            lld \
            make \
            mtools \
            nasm \
            qemu-system-x86 \
            xorriso

      - name: Run x86_64 headless boot smoke
        working-directory: core
        run: make clean x86_64-smoke

      - name: Upload x86_64 serial smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-smoke-log
          path: core/build/x86_64/x86_64-smoke.log
          if-no-files-found: ignore
